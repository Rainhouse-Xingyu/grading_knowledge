server:
  port: 8080

spring:
  application:
    name: grading-knowledge

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/neusoft_ai_grading?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: MYxingyu20022453..
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.neusoft.grading.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: neusoft-submissions

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# CAS 统一身份认证
cas:
  server-url: https://cas.neusoft.edu.cn
  service-name: http://localhost:8080
  login-url: https://cas.neusoft.edu.cn/login?service=http://localhost:8080
  logout-url: https://cas.neusoft.edu.cn/logout?service=http://localhost:8080
  mock: true  # 开发模式 true，生产环境改为 false

# 日志
logging:
  level:
    com.neusoft.grading: debug
    org.springframework.security: info
